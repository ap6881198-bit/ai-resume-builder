<!DOCTYPE html>
<html>

<head>

<title>Free AI Resume Builder</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Free AI Resume Builder</h1>

<p>Create professional resumes instantly using AI.</p>

<form id="resumeForm">

<input type="text" id="name" placeholder="Your Name">

<input type="text" id="job" placeholder="Job Title">

<textarea id="skills" placeholder="Skills"></textarea>

<textarea id="experience" placeholder="Experience"></textarea>

<button onclick="generateResume()">Generate Resume</button>

<button onclick="downloadPDF()">Download Resume PDF</button>

</form>

<div id="resumeOutput"></div>

<button onclick="downloadPDF()">Download PDF</button>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>

</body>

</html>
